<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Creating Connections — Compatibility Matrix</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <h1>Creating Connections</h1>
      <div id="teamBadgeArea">
        <div class="header-code" id="headerCode">
          <input type="text" id="codeInput" placeholder="Code" maxlength="4" autocomplete="off" style="text-transform:uppercase;">
          <button type="button" id="codeSubmit">Join</button>
        </div>
        <div class="team-badge" id="teamBadge" style="display:none;"></div>
      </div>
    </header>

    <div id="banner" class="banner" role="alert"></div>

    <!-- Code prompt modal (shown when submitting without auth) -->
    <div class="name-overlay" id="codeOverlay">
      <div class="name-modal">
        <h2>Enter your code</h2>
        <p>Your facilitator will give you a 4-character code</p>
        <div class="name-inputs">
          <input type="text" id="codeInputModal" placeholder="e.g. A3K9" maxlength="4"
                 autocomplete="off" autocapitalize="characters" style="text-transform:uppercase;">
        </div>
        <p class="code-error" id="codeError" style="display:none;">Invalid code. Check with your facilitator.</p>
        <button type="button" class="btn-submit" id="codeSubmitModal">Join</button>
        <button type="button" class="name-skip" id="codeSkip">Cancel</button>
      </div>
    </div>

    <!-- Name entry -->
    <div class="name-overlay" id="nameOverlay">
      <div class="name-modal">
        <h2>What's your team name?</h2>
        <p>Enter your name or names</p>
        <div class="name-inputs">
          <input type="text" id="nameInput" placeholder="e.g. Tom & Jerry" maxlength="30" autocomplete="off">
        </div>
        <button type="button" class="btn-submit" id="saveNames">Save</button>
        <button type="button" class="name-skip" id="skipNames">Skip for now</button>
      </div>
    </div>

    <main class="student-main" id="studentMain">
      <div class="meet-row">
        <select id="metPair" disabled>
          <option value="">Who did you meet?</option>
        </select>
      </div>

      <p class="matrix-label">Compatibility Matrix</p>

      <div class="matrix-hero">
        <svg id="radarSvg" viewBox="-60 0 520 420"></svg>
      </div>

      <div class="score-controls" id="scoreControls"></div>

      <input type="text" id="notes" class="notes-input" placeholder="Notes (optional)" maxlength="200">

      <button type="button" class="btn-submit" id="submitBtn">Submit</button>
    </main>
  </div>

  <script src="/student.js"></script>
</body>
</html>
