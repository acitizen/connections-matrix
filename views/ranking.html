<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Connections Matrix — Final Ranking</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="page">
    <header>
      <div>
        <h1>Creating Connections</h1>
        <p>Submit your final group preferences</p>
      </div>
    </header>

    <div class="container">
      <div id="banner" class="banner" role="alert"></div>

      <form id="rankingForm" novalidate>

        <div class="card">
          <h2>Who are you?</h2>
          <div class="field">
            <label for="yourPair">Your pair ID</label>
            <select id="yourPair" required>
              <option value="">— Select your pair —</option>
            </select>
          </div>
        </div>

        <div class="card">
          <h2>Your top 3 preferences</h2>
          <p style="font-size:.85rem;color:var(--text-muted);margin-bottom:16px;">
            Rank the pairs from the opposite cohort you'd most like to work with.
          </p>

          <div class="field">
            <label for="rank1">1st preference</label>
            <select id="rank1" required disabled>
              <option value="">— Select your pair first —</option>
            </select>
          </div>

          <div class="field">
            <label for="rank2">2nd preference</label>
            <select id="rank2" required disabled>
              <option value="">— Select your pair first —</option>
            </select>
          </div>

          <div class="field">
            <label for="rank3">3rd preference</label>
            <select id="rank3" required disabled>
              <option value="">— Select your pair first —</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Submit Ranking</button>
      </form>

      <nav class="nav-links">
        <a href="/">Back to rating form</a>
      </nav>
    </div>
  </div>

  <script src="/ranking.js"></script>
</body>
</html>
